<!--Peça a largura e a altura de um retângulo e calcule a área. Formula: largura * altura-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Retângulo</title>
</head>
<body>

    <script>
        let largura = Number(prompt("Digite a largura do retângulo:"));
        let altura = Number(prompt("Digite a altura do retângulo:"));

        let area = largura * altura;

        alert("A área do retângulo é: " + area);
    </script>

</body>
</html>
