<!--Peça a idade do usuário e calcule aproximadamente quantos meses ele já viveu. -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meses Vividos</title>
</head>
<body>

    <script>
        let idade = Number(prompt("Digite sua idade:"));

        let mesesVividos = idade * 12;

        alert("Você já viveu aproximadamente " + mesesVividos + " meses.");
    </script>

</body>
</html>
