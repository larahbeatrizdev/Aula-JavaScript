<!--Peça nome, idade e curso. Depois exiba uma frase completa com essas informações.-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro do Aluno</title>
</head>
<body>

    <script>
        let nome = prompt("Digite seu nome:");
        let idade = prompt("Digite sua idade:");
        let curso = prompt("Digite seu curso:");

        alert("Olá! Meu nome é " + nome +
              ", tenho " + idade + " anos e faço o curso de " + curso + ".");
    </script>

</body>
</html>
